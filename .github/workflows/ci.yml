name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r requirements-dev.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run pytest
        run: pytest -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

      - name: Run ruff
        run: ruff check .

      # warn-only initially; ratchet to fail-on-error once codebase reaches mypy-clean baseline
      - name: Run mypy
        continue-on-error: true
        run: python -m mypy backend

      - name: Run svelte-check
        working-directory: frontend
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Run eslint
        working-directory: frontend
        run: npx eslint src

      - name: Run prettier --check
        working-directory: frontend
        run: npx prettier --check src

      - name: Run vitest
        working-directory: frontend
        run: npm run test:unit

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: frontend
        run: npx playwright test --project=chromium
        # If the cold backend import re-emerges as a flake, bump
        # webServer.timeout in playwright.config.ts before adding
        # continue-on-error here.

  audit:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Audit signals are warn-only: a CVE in a transitive dep should not block
    # PRs, but the report should be visible in the run log.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: pip-audit -r backend/requirements.txt

      - name: Run npm audit
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level moderate
